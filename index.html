<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trickster Music</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        yt: {
                            bg: '#030303',
                            surface: '#181818',
                            surfaceHover: '#282828',
                            accent: '#ff0033', 
                            text: '#ffffff',
                            textMuted: '#aaaaaa'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'Roboto', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        body {
            background-color: #030303;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
        }
        
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #030303;
        }
        ::-webkit-scrollbar-thumb {
            background: #2a2a2a;
            border-radius: 20px;
            border: 2px solid #030303;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #ff0033;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .album-art-container .play-overlay {
            opacity: 0;
            transition: all 0.2s ease-in-out;
        }
        .album-art-container:hover .play-overlay {
            opacity: 1;
            background: rgba(0, 0, 0, 0.5);
        }

        .glass-nav {
            background: rgba(3, 3, 3, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .page-transition {
            transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #main-scroll-area {
            height: calc(100vh - 72px - 90px);
            overflow-y: auto;
            overflow-x: hidden;
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #ff0033;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.2);
            height: 4px;
            border-radius: 2px;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 12px;
            width: 12px;
            border-radius: 50%;
            background: #ff0033;
            cursor: pointer;
        }

        #progress-container {
            height: 4px;
            transition: height 0.2s;
        }
        #progress-container:hover {
            height: 6px;
        }

        .tab-btn {
            position: relative;
            padding: 8px 16px;
            font-size: 0.875rem;
            font-weight: 600;
            color: #aaaaaa;
            transition: all 0.2s;
        }
        .tab-btn.active {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
        }
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -14px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 3px;
            background: #ff0033;
            border-radius: 2px;
        }
    </style>
</head>
<body class="antialiased h-screen w-full flex flex-col selection:bg-yt-accent selection:text-white">

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="absolute inset-0 z-50 flex items-center justify-center bg-yt-bg page-transition">
        <div class="w-full max-w-md p-8 bg-yt-surface rounded-2xl shadow-2xl border border-white/5 flex flex-col items-center">
            <div class="w-20 h-20 bg-gradient-to-br from-yt-accent to-purple-600 rounded-full flex items-center justify-center mb-6 shadow-[0_0_30px_rgba(255,0,51,0.3)]">
                <i class="ph-fill ph-mask-happy text-4xl text-white"></i>
            </div>
            <h1 class="text-3xl font-bold tracking-tight mb-2">Trickster Music</h1>
            <p class="text-yt-textMuted mb-8 text-center">Connected to TruStore DB</p>

            <form id="login-form" class="w-full space-y-4">
                <input type="text" id="access-id" placeholder="Access ID" class="w-full bg-[#0f0f0f] border border-white/10 text-white rounded-xl py-3 px-4 focus:outline-none focus:border-yt-accent" value="trickster_vip">
                <input type="password" id="passcode" placeholder="Passcode" class="w-full bg-[#0f0f0f] border border-white/10 text-white rounded-xl py-3 px-4 focus:outline-none focus:border-yt-accent" value="••••••••">
                <button type="submit" class="w-full bg-yt-accent hover:bg-red-600 text-white font-semibold rounded-xl py-3.5 flex justify-center items-center gap-2 transition-all active:scale-95">
                    <span>Unlock Library</span>
                    <i class="ph-bold ph-arrow-right"></i>
                </button>
            </form>
            <button type="button" id="guest-btn" class="mt-6 text-sm text-yt-textMuted hover:text-white transition-colors">Use as a guest</button>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="main-app" class="hidden flex-col h-full w-full opacity-0 page-transition translate-y-4">
        <nav class="glass-nav h-[72px] sticky top-0 z-30 w-full px-4 md:px-8 py-4 flex items-center justify-between border-b border-white/5">
            <div class="flex items-center gap-8">
                <div class="flex items-center gap-3">
                    <i class="ph-fill ph-mask-happy text-3xl text-yt-accent"></i>
                    <span class="text-xl font-bold tracking-tight">Trickster</span>
                </div>
                <!-- Navigation Tabs -->
                <div class="hidden lg:flex items-center gap-2">
                    <button class="tab-btn active" onclick="switchTab('home')">Home</button>
                    <button class="tab-btn" onclick="switchTab('explore')">Explore</button>
                    <button class="tab-btn" onclick="switchTab('playlists')">Playlists</button>
                    <button class="tab-btn" onclick="switchTab('liked')">Liked Songs</button>
                </div>
            </div>
            
            <div class="flex-1 max-w-md mx-4 hidden md:flex items-center bg-white/10 rounded-full px-4 py-2 ml-auto">
                <i class="ph ph-magnifying-glass text-yt-textMuted mr-2"></i>
                <input type="text" placeholder="Search..." class="bg-transparent border-none outline-none w-full text-sm text-white">
            </div>
        </nav>

        <div id="main-scroll-area">
            <main class="pt-6 px-4 md:px-8 pb-10" id="library-content">
                <div id="global-loader" class="flex flex-col items-center justify-center py-20 gap-4">
                    <div class="spinner"></div>
                    <p class="text-yt-textMuted animate-pulse">Syncing tracks from GitHub DB...</p>
                </div>
            </main>
        </div>

        <!-- PLAYER -->
        <div class="h-[90px] fixed bottom-0 left-0 w-full bg-[#0a0a0a] border-t border-white/10 z-40 px-4 py-3 flex items-center justify-between">
            <!-- Skim Bar -->
            <div class="absolute top-0 left-0 w-full bg-white/10 group cursor-pointer" id="progress-container">
                <div id="player-progress" class="h-full bg-yt-accent w-0 relative">
                    <div class="absolute right-0 top-1/2 -translate-y-1/2 w-4 h-4 bg-white rounded-full scale-0 group-hover:scale-100 transition-transform shadow-lg"></div>
                </div>
            </div>

            <!-- Left: Info & Time -->
            <div class="flex items-center gap-4 w-1/3 truncate">
                <div class="w-12 h-12 rounded bg-yt-surface flex-shrink-0 flex items-center justify-center overflow-hidden">
                    <img id="player-art" src="" class="w-full h-full object-cover hidden">
                    <i id="player-placeholder" class="ph ph-music-notes text-2xl text-yt-textMuted"></i>
                </div>
                <div class="truncate flex items-center gap-3">
                    <div class="truncate">
                        <h4 id="player-title" class="text-sm font-semibold truncate max-w-[150px]">Not Playing</h4>
                        <p id="player-artist" class="text-xs text-yt-textMuted truncate max-w-[150px]">Select a track</p>
                    </div>
                    <div class="flex items-center gap-1 text-[10px] text-yt-textMuted font-medium whitespace-nowrap bg-white/5 px-2 py-1 rounded">
                        <span id="time-current">0:00</span>
                        <span class="opacity-40">/</span>
                        <span id="time-total">0:00</span>
                    </div>
                </div>
            </div>

            <!-- Center: Controls + Vote Buttons -->
            <div class="flex items-center justify-center w-1/3 gap-6">
                <div class="flex items-center gap-6">
                    <button id="btn-prev" class="text-yt-textMuted hover:text-white transition active:scale-90"><i class="ph-fill ph-skip-back text-2xl"></i></button>
                    <button id="play-pause-btn" class="w-12 h-12 bg-white text-black rounded-full flex items-center justify-center hover:scale-105 active:scale-95 transition">
                        <i id="play-icon" class="ph-fill ph-play text-2xl"></i>
                    </button>
                    <button id="btn-next" class="text-yt-textMuted hover:text-white transition active:scale-90"><i class="ph-fill ph-skip-forward text-2xl"></i></button>
                </div>
                <div class="flex items-center gap-4 pl-4 border-l border-white/10">
                    <button id="btn-like" class="text-yt-textMuted hover:text-white transition"><i class="ph ph-thumbs-up text-xl"></i></button>
                    <button id="btn-dislike" class="text-yt-textMuted hover:text-white transition"><i class="ph ph-thumbs-down text-xl"></i></button>
                </div>
            </div>

            <!-- Right: Volume -->
            <div class="w-1/3 flex justify-end items-center gap-4 text-yt-textMuted">
                <i class="ph ph-speaker-high text-xl" id="vol-icon"></i>
                <div class="w-32 flex items-center">
                    <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1" class="w-full accent-yt-accent">
                </div>
            </div>
        </div>
    </div>

    <audio id="audio-engine"></audio>

    <script>
        const REPO_OWNER = 'TruStoreOfficial';
        const REPO_NAME = 'trickster.music';
        const BASE_PATH = 'localhost';
        const PLAYLIST_BASE = 'RenderX';
        const CATEGORIES = ['Phonk', 'J-Pop', 'Electronic', 'Memes', 'Pop', 'Rap', 'Rock'];

        let elements = {};
        let library = {}; 
        let allSongs = []; 
        let currentPlaylist = [];
        let currentIndex = -1;
        let isPlaying = false;
        let isDraggingProgress = false;
        let activeTab = 'home';

        const GENRE_COVERS = {
            'J-Pop': 'https://images.unsplash.com/photo-1526218626217-dc65a29bb444?auto=format&fit=crop&w=300&q=80',
            'Electronic': 'https://images.unsplash.com/photo-1470225620780-dba8ba36b745?auto=format&fit=crop&w=300&q=80',
            'Memes': 'https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&w=300&q=80',
            'Pop': 'https://images.unsplash.com/photo-1493225255756-d9584f8606e9?auto=format&fit=crop&w=300&q=80',
            'Rap': 'https://images.unsplash.com/photo-1508700115892-45ecd05ae2ad?auto=format&fit=crop&w=300&q=80',
            'Rock': 'https://images.unsplash.com/photo-1498038432885-c6f3f1b912ee?auto=format&fit=crop&w=300&q=80',
            'Phonk': 'https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?auto=format&fit=crop&w=300&q=80'
        };

        const setCookie = (name, value) => {
            document.cookie = `${name}=${JSON.stringify(value)};path=/;max-age=31536000`;
        };
        const getCookie = (name) => {
            const val = document.cookie.match('(^|;)\\s*' + name + '\\s*=\\s*([^;]+)');
            return val ? JSON.parse(val.pop()) : null;
        };

        let userLikes = getCookie('trickster_likes') || { liked: [], disliked: [] };

        window.addEventListener('DOMContentLoaded', () => {
            elements = {
                loginScreen: document.getElementById('login-screen'),
                loginForm: document.getElementById('login-form'),
                guestBtn: document.getElementById('guest-btn'),
                mainApp: document.getElementById('main-app'),
                libraryContent: document.getElementById('library-content'),
                audio: document.getElementById('audio-engine'),
                playerTitle: document.getElementById('player-title'),
                playerArtist: document.getElementById('player-artist'),
                playerArt: document.getElementById('player-art'),
                playerPlaceholder: document.getElementById('player-placeholder'),
                playPauseBtn: document.getElementById('play-pause-btn'),
                playIcon: document.getElementById('play-icon'),
                progressBar: document.getElementById('player-progress'),
                progressContainer: document.getElementById('progress-container'),
                timeCurrent: document.getElementById('time-current'),
                timeTotal: document.getElementById('time-total'),
                volumeSlider: document.getElementById('volume-slider'),
                btnLike: document.getElementById('btn-like'),
                btnDislike: document.getElementById('btn-dislike'),
                btnNext: document.getElementById('btn-next'),
                btnPrev: document.getElementById('btn-prev')
            };

            elements.loginForm.onsubmit = (e) => { e.preventDefault(); enterApp(); };
            elements.guestBtn.onclick = enterApp;
            elements.playPauseBtn.onclick = togglePlay;
            elements.btnNext.onclick = playNext;
            elements.btnPrev.onclick = playPrev;

            const handleProgressInput = (clientX) => {
                if (!elements.audio.duration) return;
                const rect = elements.progressContainer.getBoundingClientRect();
                const pos = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
                elements.audio.currentTime = pos * elements.audio.duration;
                elements.progressBar.style.width = `${pos * 100}%`;
                elements.timeCurrent.textContent = formatTime(elements.audio.currentTime);
            };

            elements.progressContainer.onmousedown = (e) => {
                isDraggingProgress = true;
                handleProgressInput(e.clientX);
            };

            window.addEventListener('mousemove', (e) => {
                if (isDraggingProgress) handleProgressInput(e.clientX);
            });

            window.addEventListener('mouseup', () => {
                isDraggingProgress = false;
            });

            elements.volumeSlider.oninput = (e) => {
                const vol = e.target.value;
                elements.audio.volume = vol;
                const icon = document.getElementById('vol-icon');
                if (vol == 0) icon.className = "ph ph-speaker-slash text-xl";
                else if (vol < 0.5) icon.className = "ph ph-speaker-low text-xl";
                else icon.className = "ph ph-speaker-high text-xl";
            };

            elements.btnLike.onclick = () => handleVote('like');
            elements.btnDislike.onclick = () => handleVote('dislike');

            if (elements.audio) {
                elements.audio.ontimeupdate = () => {
                    if (elements.audio.duration && !isDraggingProgress) {
                        const percent = (elements.audio.currentTime / elements.audio.duration) * 100;
                        elements.progressBar.style.width = `${percent}%`;
                        elements.timeCurrent.textContent = formatTime(elements.audio.currentTime);
                        elements.timeTotal.textContent = formatTime(elements.audio.duration);
                    }
                };
                elements.audio.onended = playNext;
            }
        });

        function formatTime(seconds) {
            if (isNaN(seconds)) return "0:00";
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min}:${sec.toString().padStart(2, '0')}`;
        }

        async function fetchSongsFromRepo() {
            try {
                for (const cat of CATEGORIES) {
                    const apiUrl = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${BASE_PATH}/${cat}`;
                    const response = await fetch(apiUrl);
                    if (!response.ok) continue;
                    const files = await response.json();
                    const audioFiles = mapFilesToSongs(files, cat, GENRE_COVERS[cat]);
                    if (audioFiles.length > 0) {
                        library[cat] = audioFiles;
                        audioFiles.forEach(s => {
                            if (!allSongs.find(exist => exist.id === s.id)) allSongs.push(s);
                        });
                    }
                }

                try {
                    const rxUrl = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${PLAYLIST_BASE}`;
                    const rxResponse = await fetch(rxUrl);
                    if (rxResponse.ok) {
                        const rxDirs = await rxResponse.json();
                        const playlists = rxDirs.filter(item => item.type === 'dir');
                        for (const pl of playlists) {
                            const plRes = await fetch(pl.url);
                            if (!plRes.ok) continue;
                            const plFiles = await plRes.json();
                            const defaultPlCover = plFiles.find(f => f.name.match(/\.(jpg|jpeg|png|webp|gif)$/i));
                            const audioFiles = mapFilesToSongs(plFiles, pl.name.replace(/%20/g, ' '), defaultPlCover?.download_url);
                            if (audioFiles.length > 0) {
                                library[`Playlist: ${pl.name.replace(/%20/g, ' ')}`] = audioFiles;
                                audioFiles.forEach(s => {
                                    if (!allSongs.find(exist => exist.id === s.id)) allSongs.push(s);
                                });
                            }
                        }
                    }
                } catch(e) {}

                switchTab('home');
            } catch (err) {
                console.error("Fetch Error:", err);
            }
        }

        function mapFilesToSongs(files, defaultArtist, defaultCover) {
            return files.filter(file => file.name.match(/\.(mp3|wav|mp4|m4a)$/i)).map(file => {
                const fileName = file.name.replace(/\.[^/.]+$/, "");
                const artworkFile = files.find(f => f.name.startsWith(fileName) && f.name.match(/\.(jpg|jpeg|png|webp|gif)$/i));
                let title = fileName;
                let artist = defaultArtist;
                if (fileName.includes(" - ")) {
                    const parts = fileName.split(" - ");
                    artist = parts[0].trim();
                    title = parts[1].trim();
                }
                return {
                    id: file.sha,
                    title: title.replace(/[_-]/g, " "),
                    artist: artist.replace(/[_-]/g, " "),
                    url: file.download_url,
                    cover: artworkFile ? artworkFile.download_url : (defaultCover || GENRE_COVERS['Pop'])
                };
            });
        }

        function switchTab(tab) {
            activeTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.toLowerCase().includes(tab.toLowerCase()));
            });
            renderView();
        }

        function renderView() {
            const container = elements.libraryContent;
            container.innerHTML = '';
            
            let contentToRender = {};
            let isExploreGrid = activeTab === 'explore';

            if (activeTab === 'home') {
                Object.keys(library).forEach(cat => {
                    if (!cat.startsWith('Playlist: ')) contentToRender[cat] = library[cat];
                });
            } else if (activeTab === 'explore') {
                const shuffled = [...allSongs].sort(() => 0.5 - Math.random());
                contentToRender['Fresh Finds'] = shuffled.slice(0, 20);
            } else if (activeTab === 'playlists') {
                Object.keys(library).forEach(cat => {
                    if (cat.startsWith('Playlist: ')) {
                        contentToRender[cat.replace('Playlist: ', '')] = library[cat];
                    }
                });
                if (Object.keys(contentToRender).length === 0) {
                    container.innerHTML = `<div class="py-20 text-center text-yt-textMuted">No playlists found in ${PLAYLIST_BASE}.</div>`;
                    return;
                }
            } else if (activeTab === 'liked') {
                const likedTracks = allSongs.filter(s => userLikes.liked.includes(s.id));
                if (likedTracks.length === 0) {
                    container.innerHTML = `<div class="py-20 text-center text-yt-textMuted">No liked songs yet. Tap the thumb up!</div>`;
                    return;
                }
                contentToRender['Favorites'] = likedTracks;
            }

            for (const [category, songs] of Object.entries(contentToRender)) {
                const safeId = category.replace(/[^a-zA-Z0-9]/g, '');
                const section = document.createElement('div');
                section.className = 'mb-10';
                
                // Use different layout for Explore (Grid) vs others (Rows)
                const listClass = isExploreGrid 
                    ? 'grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6 px-2 pb-4'
                    : 'flex overflow-x-auto hide-scrollbar gap-5 px-2 pb-4';

                section.innerHTML = `
                    <div class="px-2 mb-4">
                        <h2 class="text-2xl font-bold tracking-tight">${category}</h2>
                    </div>
                    <div class="${listClass}" id="row-${safeId}"></div>
                `;
                container.appendChild(section);

                const row = document.getElementById(`row-${safeId}`);
                songs.forEach(song => {
                    const card = document.createElement('div');
                    card.className = isExploreGrid 
                        ? 'cursor-pointer group' 
                        : 'flex-none w-40 md:w-48 cursor-pointer group';
                    
                    card.onclick = () => {
                        currentPlaylist = [...songs];
                        currentIndex = currentPlaylist.findIndex(s => s.id === song.id);
                        playTrack(song);
                    };
                    card.innerHTML = `
                        <div class="relative aspect-square mb-3 rounded-xl overflow-hidden bg-yt-surface album-art-container shadow-lg">
                            <img src="${song.cover}" class="w-full h-full object-cover group-hover:scale-105 transition duration-500" loading="lazy">
                            <div class="play-overlay absolute inset-0 flex items-center justify-center">
                                <div class="w-12 h-12 bg-white/20 backdrop-blur-md rounded-full flex items-center justify-center shadow-2xl">
                                    <i class="ph-fill ph-play text-white text-xl flex items-center justify-center ml-1"></i>
                                </div>
                            </div>
                        </div>
                        <h3 class="font-semibold text-sm truncate pr-2">${song.title}</h3>
                        <p class="text-xs text-yt-textMuted truncate">${song.artist}</p>
                    `;
                    row.appendChild(card);
                });
            }
        }

        async function playTrack(song) {
            elements.progressBar.style.width = '0%';
            elements.timeCurrent.textContent = "0:00";
            
            elements.audio.pause();
            elements.audio.src = song.url;
            elements.audio.load();

            try {
                await elements.audio.play();
                setPlayState(true);
            } catch (e) {
                if (e.name !== "AbortError") console.error(e);
            }

            elements.playerTitle.textContent = song.title;
            elements.playerArtist.textContent = song.artist;
            elements.playerArt.src = song.cover;
            elements.playerArt.classList.remove('hidden');
            elements.playerPlaceholder.classList.add('hidden');
            updateLikeUI(song.id);
        }

        function togglePlay() {
            if (!elements.audio.src) return;
            if (isPlaying) {
                elements.audio.pause();
                setPlayState(false);
            } else {
                elements.audio.play().catch(e => {
                    if (e.name !== "AbortError") console.error(e);
                });
                setPlayState(true);
            }
        }

        function playNext() {
            if (currentPlaylist.length > 0 && currentIndex < currentPlaylist.length - 1) {
                currentIndex++;
                playTrack(currentPlaylist[currentIndex]);
            }
        }

        function playPrev() {
            if (currentPlaylist.length > 0 && currentIndex > 0) {
                currentIndex--;
                playTrack(currentPlaylist[currentIndex]);
            }
        }

        function handleVote(type) {
            if (currentIndex === -1 || !currentPlaylist[currentIndex]) return;
            const song = currentPlaylist[currentIndex];
            const other = type === 'like' ? 'disliked' : 'liked';
            const target = type === 'like' ? 'liked' : 'disliked';
            
            userLikes[other] = userLikes[other].filter(id => id !== song.id);
            if (userLikes[target].includes(song.id)) {
                userLikes[target] = userLikes[target].filter(id => id !== song.id);
            } else {
                userLikes[target].push(song.id);
            }
            setCookie('trickster_likes', userLikes);
            updateLikeUI(song.id);
            
            if (activeTab === 'liked') renderView();
        }

        function updateLikeUI(songId) {
            const isLiked = userLikes.liked.includes(songId);
            const isDisliked = userLikes.disliked.includes(songId);
            
            elements.btnLike.className = isLiked ? "text-yt-accent transition scale-110" : "text-yt-textMuted hover:text-white transition";
            elements.btnLike.innerHTML = isLiked ? '<i class="ph-fill ph-thumbs-up text-xl"></i>' : '<i class="ph ph-thumbs-up text-xl"></i>';
            
            elements.btnDislike.className = isDisliked ? "text-yt-accent transition scale-110" : "text-yt-textMuted hover:text-white transition";
            elements.btnDislike.innerHTML = isDisliked ? '<i class="ph-fill ph-thumbs-down text-xl"></i>' : '<i class="ph ph-thumbs-down text-xl"></i>';
        }

        function setPlayState(playing) {
            isPlaying = playing;
            elements.playIcon.className = isPlaying ? "ph-fill ph-pause text-2xl" : "ph-fill ph-play text-2xl";
        }

        function enterApp() {
            elements.loginScreen.classList.add('opacity-0', '-translate-y-4');
            setTimeout(() => {
                elements.loginScreen.style.display = 'none';
                elements.mainApp.classList.remove('hidden');
                setTimeout(() => {
                    elements.mainApp.classList.remove('opacity-0', 'translate-y-4');
                    fetchSongsFromRepo();
                }, 50);
            }, 500);
        }
    </script>
</body>
</html>
